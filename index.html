<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwek Kwek Calculator</title>
    <!-- Stable PyScript Engine Links -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body style="font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9;">

    <h1>Welcome to the Kwek Kwek Calculator! 🥚</h1>
    <p>Find out how many pieces of kwek kwek you can buy.</p>

    <!-- Inputs -->
    <div style="margin-bottom: 15px;">
        <label>How much money do you have right now? </label><br>
        <input type="number" id="user_money" value="100">
    </div>

    <div style="margin-bottom: 15px;">
        <label>How much is one piece of kwek kwek? </label><br>
        <input type="number" id="kwek_price" value="5">
    </div>

    <!-- The Standard HTML Button -->
    <button id="calc_btn" style="padding: 8px 15px; background-color: #ff6600; color: white; border: none; cursor: pointer; border-radius: 4px;">
        Calculate
    </button>

    <hr>

    <!-- Results Area -->
    <div id="output" style="white-space: pre-line; font-weight: bold; color: #333; line-height: 1.6;"></div>

    <!-- Python Script -->
    <script type="py">
        from pyscript import document
        from pyodide.ffi import create_proxy

        def calculate_kwek(event):
            # 1. Grab values safely from the HTML fields
            money_input = document.querySelector("#user_money").value
            price_input = document.querySelector("#kwek_price").value

            amount = int(money_input)
            price = int(price_input)

            # 2. Logic Check
            if price <= 0:
                result_text = "Price must be greater than 0!"
            else:
                total_kwek_kwek = amount // price
                leftover_money = amount % price
                
                result_text = f"You can buy {total_kwek_kwek} pieces of kwek kwek with your money.\n"
                result_text += f"And you will have ₱{leftover_money} left.\n"
                result_text += "Eat well hehe 🧡"

            # 3. Output back to HTML
            document.querySelector("#output").innerText = result_text

        # 4. Attach the Python function directly to the HTML button's click event listener
        button = document.querySelector("#calc_btn")
        button.addEventListener("click", create_proxy(calculate_kwek))
    </script>

</body>
</html>
